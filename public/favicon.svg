<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cyber-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF000" />
      <stop offset="100%" stop-color="#FF9900" />
    </linearGradient>
    
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#0077FF" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <polygon points="32,2 60,16 60,48 32,62 4,48 4,16" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.4" stroke-dasharray="6 3"/>

  <path d="M16,50 C26,58 46,52 52,32 C54,24 50,14 46,10 C46,10 44,18 40,22 C30,32 20,28 12,18 C10,28 10,42 16,50 Z" fill="url(#cyber-yellow)" stroke="#FFFFFF" stroke-width="1.2"/>

  <path d="M22,44 L30,40 L34,46" fill="none" stroke="#1A1A1A" stroke-width="1.5" />
  <path d="M38,32 L44,28" fill="none" stroke="#1A1A1A" stroke-width="1.5" />
  
  <circle cx="30" cy="40" r="2.5" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="44" cy="28" r="2" fill="#00E5FF" filter="url(#glow)"/>
  
  <rect x="16" y="24" width="3" height="3" fill="#00E5FF" opacity="0.8"/>
  <rect x="48" y="46" width="4" height="2" fill="#00E5FF" opacity="0.6"/>
</svg>
